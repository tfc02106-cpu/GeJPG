<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI AOI 工件影像資料增強生成器｜專業純白／純灰背景版</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --ink: #1f2937;
            --muted: #6b7280;
            --line: #d1d5db;
            --panel: #ffffff;
            --soft: #f3f4f6;
            --success: #16a34a;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", Arial, sans-serif;
            background: linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);
            color: var(--ink);
            min-height: 100vh;
            padding: 32px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: min(760px, 100%);
            background: var(--panel);
            border: 1px solid rgba(148, 163, 184, 0.35);
            border-radius: 18px;
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
            overflow: hidden;
        }

        .header {
            padding: 26px 28px 18px;
            border-bottom: 1px solid #e5e7eb;
            background: #ffffff;
        }

        h2 {
            margin: 0 0 10px;
            color: #0f172a;
            font-size: 24px;
            letter-spacing: 0.02em;
        }

        .subtitle {
            margin: 0;
            color: var(--muted);
            font-size: 15px;
            line-height: 1.7;
            text-align: left;
        }

        .content { padding: 24px 28px 28px; }

        .upload-zone {
            border: 2px dashed #cbd5e1;
            padding: 22px;
            border-radius: 14px;
            background: #f8fafc;
            margin: 0 0 20px;
            cursor: pointer;
            text-align: center;
            transition: 0.2s ease;
        }

        .upload-zone:hover,
        .upload-zone.dragover {
            border-color: var(--primary);
            background: #eff6ff;
        }

        #file-input { display: none; }

        #file-name {
            color: #475569;
            font-weight: 600;
        }

        .settings {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        .setting-card {
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            padding: 16px;
            background: #ffffff;
            text-align: left;
        }

        .setting-card h3 {
            margin: 0 0 12px;
            font-size: 15px;
            color: #111827;
        }

        label.option {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 9px 0;
            color: #374151;
            font-size: 14px;
            cursor: pointer;
        }

        .tip {
            margin: 12px 0 20px;
            padding: 12px 14px;
            border-radius: 12px;
            background: #f0fdf4;
            color: #166534;
            font-size: 14px;
            line-height: 1.6;
            text-align: left;
        }

        .btn {
            width: 100%;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            padding: 14px 22px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 18px rgba(37, 99, 235, 0.18);
            transition: 0.2s ease;
        }

        .btn:hover { background: var(--primary-dark); }
        .btn:disabled {
            background: #cbd5e1;
            box-shadow: none;
            cursor: not-allowed;
        }

        #status {
            margin-top: 16px;
            color: var(--primary-dark);
            font-weight: 700;
            line-height: 1.6;
            white-space: pre-line;
            text-align: center;
        }

        .preview-wrap {
            margin-top: 20px;
            display: none;
            text-align: left;
        }

        .preview-wrap h3 {
            margin: 0 0 10px;
            font-size: 15px;
            color: #111827;
        }

        #previewCanvas {
            width: 100%;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            background: #fff;
            display: block;
        }

        #calcCanvas { display: none; }

        @media (max-width: 680px) {
            .settings { grid-template-columns: 1fr; }
            .header, .content { padding-left: 18px; padding-right: 18px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>AOI 工件影像資料增強生成器</h2>
        <p class="subtitle">
            本版已移除原本的隨機漸層、桌面紋理雜訊與曝光漂移。輸出背景固定為專業純白或中性灰，適合教材展示、AOI 樣本整理與影像辨識前處理練習。
        </p>
    </div>

    <div class="content">
        <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
            <span id="file-name">📂 點擊這裡選擇或拖入筆的照片</span>
            <input type="file" id="file-input" accept="image/*" onchange="handleFileSelect(event)">
        </div>

        <div class="settings">
            <div class="setting-card">
                <h3>背景模式</h3>
                <label class="option"><input type="radio" name="bg-mode" value="white" checked> 純白背景 #FFFFFF</label>
                <label class="option"><input type="radio" name="bg-mode" value="gray"> 中性灰背景 #E5E7EB</label>
                <label class="option"><input type="radio" name="bg-mode" value="alternate"> 前 15 張白底，後 15 張灰底</label>
            </div>

            <div class="setting-card">
                <h3>輸出格式</h3>
                <label class="option"><input type="radio" name="output-format" value="png" checked> PNG：背景最乾淨</label>
                <label class="option"><input type="radio" name="output-format" value="jpg"> JPG：檔案較小</label>
            </div>
        </div>

        <div class="tip">
            ✅ 建議正式教學或 AOI 樣本使用 PNG + 純白背景。若要訓練模型辨識不同底色，可選擇「前 15 張白底，後 15 張灰底」。
        </div>

        <button id="gen-btn" class="btn" onclick="generateImages()" disabled>請先選擇圖片</button>
        <div id="status"></div>

        <div class="preview-wrap" id="preview-wrap">
            <h3>預覽</h3>
            <canvas id="previewCanvas"></canvas>
        </div>
    </div>
</div>

<canvas id="calcCanvas"></canvas>

<script>
    let loadedImage = null;
    const OUTPUT_COUNT = 30;

    const uploadZone = document.getElementById('upload-zone');
    const fileInput = document.getElementById('file-input');

    uploadZone.addEventListener('dragover', function(event) {
        event.preventDefault();
        uploadZone.classList.add('dragover');
    });

    uploadZone.addEventListener('dragleave', function() {
        uploadZone.classList.remove('dragover');
    });

    uploadZone.addEventListener('drop', function(event) {
        event.preventDefault();
        uploadZone.classList.remove('dragover');
        const file = event.dataTransfer.files[0];
        if (file) loadImageFile(file);
    });

    function handleFileSelect(event) {
        const file = event.target.files[0];
        if (!file) return;
        loadImageFile(file);
    }

    function loadImageFile(file) {
        if (!file.type.startsWith('image/')) {
            document.getElementById('status').innerText = '請選擇圖片檔案。';
            return;
        }

        document.getElementById('file-name').innerText = `📄 已選取：${file.name}`;
        document.getElementById('status').style.color = '#1d4ed8';
        document.getElementById('status').innerText = '正在讀取圖片...';

        const reader = new FileReader();
        reader.onload = function(e) {
            loadedImage = new Image();
            loadedImage.onload = function() {
                document.getElementById('gen-btn').disabled = false;
                document.getElementById('gen-btn').innerText = `一鍵生成並下載 ${OUTPUT_COUNT} 張乾淨背景影像`;
                document.getElementById('status').innerText = '圖片就緒，可以開始生成。';
                renderPreview();
            };
            loadedImage.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function selectedBackgroundColor(index) {
        const bgMode = document.querySelector('input[name="bg-mode"]:checked').value;
        if (bgMode === 'gray') return '#e5e7eb';
        if (bgMode === 'alternate') return index <= OUTPUT_COUNT / 2 ? '#ffffff' : '#e5e7eb';
        return '#ffffff';
    }

    function selectedOutputFormat() {
        return document.querySelector('input[name="output-format"]:checked').value;
    }

    function drawSyntheticImage(ctx, canvas, index) {
        const w = loadedImage.width;
        const h = loadedImage.height;
        canvas.width = w;
        canvas.height = h;

        ctx.clearRect(0, 0, w, h);
        ctx.fillStyle = selectedBackgroundColor(index);
        ctx.fillRect(0, 0, w, h);

        ctx.save();
        ctx.translate(w / 2, h / 2);

        const angle = (Math.random() * 360 - 180) * Math.PI / 180;
        const scale = Math.random() * 0.35 + 0.8;

        ctx.rotate(angle);
        ctx.scale(scale, scale);
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        ctx.drawImage(loadedImage, -w / 2, -h / 2, w, h);
        ctx.restore();
    }

    function renderPreview() {
        if (!loadedImage) return;
        const previewWrap = document.getElementById('preview-wrap');
        const previewCanvas = document.getElementById('previewCanvas');
        const previewCtx = previewCanvas.getContext('2d');
        previewWrap.style.display = 'block';
        drawSyntheticImage(previewCtx, previewCanvas, 1);
    }

    document.querySelectorAll('input[name="bg-mode"], input[name="output-format"]').forEach(function(input) {
        input.addEventListener('change', renderPreview);
    });

    async function generateImages() {
        if (!loadedImage) return;

        const btn = document.getElementById('gen-btn');
        const status = document.getElementById('status');
        const canvas = document.getElementById('calcCanvas');
        const ctx = canvas.getContext('2d');
        const format = selectedOutputFormat();

        btn.disabled = true;
        status.style.color = '#1d4ed8';

        for (let i = 1; i <= OUTPUT_COUNT; i++) {
            status.innerText = `正在生成第 ${i} / ${OUTPUT_COUNT} 張乾淨背景影像...\n請允許瀏覽器多檔案下載權限。`;

            drawSyntheticImage(ctx, canvas, i);

            let imgDataUrl;
            let ext;
            if (format === 'jpg') {
                imgDataUrl = canvas.toDataURL('image/jpeg', 0.95);
                ext = 'jpg';
            } else {
                imgDataUrl = canvas.toDataURL('image/png');
                ext = 'png';
            }

            const bgLabel = selectedBackgroundColor(i) === '#ffffff' ? 'white' : 'gray';
            const link = document.createElement('a');
            link.href = imgDataUrl;
            link.download = `marker_clean_${bgLabel}_${String(i).padStart(2, '0')}.${ext}`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            await new Promise(resolve => setTimeout(resolve, 220));
        }

        status.style.color = '#16a34a';
        status.innerText = `🎉 ${OUTPUT_COUNT} 張乾淨背景影像已全部下載完成！`;
        btn.disabled = false;
    }
</script>

</body>
</html>
